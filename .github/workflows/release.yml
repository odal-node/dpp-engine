name: Release images

# Build and publish the node + resolver container images to GHCR on a version
# tag. Tag from a commit that already passed CI (see docs/governance/RELEASE.md).
#
# The Dockerfiles build dpp-engine alone; dpp-core is consumed from crates.io
# (published independently at 0.1.0), so only this repo is checked out.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dpp-node
            dockerfile: dpp-engine/docker/node.Dockerfile
            description: >-
              Odal Node MVP single binary — fuses vault, identity, integrator,
              and Wasm plugin host into one process for self-hosted Digital
              Product Passport deployments.
            readme: crates/dpp-node/README.md
          - image: dpp-resolver
            dockerfile: dpp-engine/docker/resolver.Dockerfile
            description: >-
              Public QR / GS1 Digital Link resolver for Digital Product
              Passports — verifies Ed25519 JWS signatures and serves HTML or
              JSON-LD, no authentication required.
            readme: crates/dpp-resolver/README.md
    steps:
      - uses: actions/checkout@v4
        with:
          path: dpp-engine

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/odal-node/${{ matrix.image }}
          # `latest` is applied automatically for non-prerelease semver tags
          # (metadata-action default flavor latest=auto).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # GHCR links a package to its source repo and shows that repo's root
          # README on the package page — both images share dpp-engine, so both
          # get the same README regardless. These labels are what actually
          # differ per package: GHCR shows `.description` as the package's
          # short blurb and `.documentation` as a deep link to the image's own
          # README (crates/dpp-node or dpp-resolver), instead of the shared one.
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.documentation=https://github.com/odal-node/dpp-engine/blob/main/${{ matrix.readme }}

      # Context is the workspace root holding both checked-out repos. BuildKit
      # honours docker/<dockerfile>.dockerignore to keep the context small.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
